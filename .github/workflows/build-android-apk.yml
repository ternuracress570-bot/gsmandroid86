name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "artifacts/mobile/**"
      - "lib/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/build-android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Android native project
        env:
          CI: "1"
        run: pnpm --filter @workspace/mobile exec expo prebuild --platform android --clean --no-install

      - name: Make Gradle wrapper executable
        working-directory: artifacts/mobile/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gsm-android-debug-apk
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
